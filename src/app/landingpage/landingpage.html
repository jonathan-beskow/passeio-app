<div
  class="bg-linear-to-r from-blue-500 to-blue-700 text-white flex flex-col justify-center items-center"
>
  <div class="text-4xl font-bold mb-4">Bem vindo à sua lista de lugares favoritos</div>
  <p>Explore, organize e compartilhe lugares incríveis que você adora!</p>

  @if (isLoggedIn()) {
      <button
    (click)="navegar()"
    class="bg-white text-blue-400 font-semibold py-3 px-8 rounded-full hover:bg-gray-100 flex space-x-3 items-center"
  >
    Olá! {{ profile?.name }} clique aqui para aproveitar o site
  </button>
  } @else {
    <button
    (click)="logarComGoogle()"
    class="bg-white text-blue-700 font-semibold py-3 px-8 rounded-full hover:bg-gray-100 flex space-x-3 items-center"
  >
  <img width="50px" src="https://images.icon-icons.com/1584/PNG/512/3721671-google_108054.png">
    Logar com Google
  </button>
  }

</div>
