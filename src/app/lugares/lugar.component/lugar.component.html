<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  <h2 class="text-2xl font-semibold text-gray-700 mg-4" mb-2>Novo Lugar</h2>
  <form id="lugarForm" [formGroup]="camposForm" (ngSubmit)="salvar()">
    <div class="mb-4">
      <label for="nome" class="block text-gray-600 font-medium mb-2">Nome do lugar</label>
      <input
        type="text"
        id="nome"
        name="nome"
        formControlName="nome"
        placeholder="Ex: Praia do sol..."
        class="w-full p-3 border border-gray-300 rounded shadown-sm focus:ring focus:ring-blue-400"
      />
    </div>

    <div class="mb-4">
      <label for="localizacao" class="block text-gray-600 font-medium mb-2"
        >Localização do lugar</label
      >
      <input
        type="text"
        id="localizacao"
        name="localizacao"
        formControlName="localizacao"
        placeholder="Ex: São Paulo..."
        class="w-full p-3 border border-gray-300 rounded shadown-sm focus:ring focus:ring-blue-400"
      />
    </div>

    <div class="mb-4">
      <label for="urlFoto" class="block text-gray-600 font-medium mb-2">Url da foto</label>
      <input
        type="text"
        id="urlFoto"
        name="urlFoto"
        formControlName="urlFoto"
        placeholder="Ex: http://www.google.com"
        class="w-full p-3 border border-gray-300 rounded shadown-sm focus:ring focus:ring-blue-400"
      />
    </div>

    <div class="mb-4">
      <label for="urlFoto" class="block text-gray-600 font-medium mb-2">Avaliação</label>
    </div>
  </form>
  <button
    type="submit"
    class="w-full bg-blue-600 text-white font-semibold p-3 rounded shadow hover:bg-blue-700"
  >
    Cadastrar Lugar
  </button>
</div>
